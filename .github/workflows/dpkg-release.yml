name: Build .deb and attach to release
run-name: Build libcamera-qbcfork .deb

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (defaults to qbc-pisp-handler)'
        required: false
        default: 'qbc-pisp-handler'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        branch:
          # On a tag push, GITHUB_REF is the tag and ${{ github.ref_name }} is
          # the tag name; the checkout below will fetch that tag's commit and
          # the branch matrix value is informational only. On workflow_dispatch
          # we honour the user's input by overriding the matrix below.
          - qbc-pisp-handler
          - main
    steps:
      - name: Decide checkout ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push — build only once per tag; skip the redundant matrix leg.
            if [ "${{ matrix.branch }}" = "main" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            fi
          else
            # workflow_dispatch — honour the input branch and skip the other.
            INPUT_BRANCH="${{ github.event.inputs.branch }}"
            if [ -z "$INPUT_BRANCH" ]; then INPUT_BRANCH="qbc-pisp-handler"; fi
            if [ "$INPUT_BRANCH" != "${{ matrix.branch }}" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "ref=${{ matrix.branch }}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check out repository
        if: steps.ref.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Install build dependencies
        if: steps.ref.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper \
            dh-python \
            dpkg-dev \
            meson \
            ninja-build \
            pkg-config \
            python3 \
            python3-dev \
            python3-jinja2 \
            python3-ply \
            python3-yaml \
            libudev-dev \
            libyaml-dev \
            libgnutls28-dev \
            openssl \
            libtiff-dev \
            libevent-dev \
            libdrm-dev \
            libboost-dev \
            libpython3-dev \
            libyuv-dev

      - name: Install libpisp from raspberrypi apt
        if: steps.ref.outputs.skip != 'true'
        run: |
          # libpisp-dev only ships in raspberrypi's apt repo; add it for arm64
          # builds. On x86 runners libpisp won't install — in that case the
          # workflow is informational only (the host arch doesn't match the Pi
          # target arch anyway). We try, log on failure, and keep going.
          sudo apt-get install -y libpisp-dev || \
            echo "WARNING: libpisp-dev not available on this runner — build will likely fail. See workflow notes."

      - name: Compute package version
        if: steps.ref.outputs.skip != 'true'
        id: version
        run: |
          # Pull project version from meson.build (single source of truth),
          # then append "+qbcfork.YYYYMMDD-N". For tag pushes use the tag's
          # date; for workflow_dispatch use today.
          MESON_VER=$(grep -E "^\s+version :" meson.build | head -1 | sed -E "s/.*version :\s*'([^']+)'.*/\1/")
          DATE=$(date -u +%Y%m%d)
          FULL_VER="${MESON_VER}+qbcfork.${DATE}-1"
          echo "version=$FULL_VER" >> "$GITHUB_OUTPUT"
          echo "Building libcamera-qbcfork $FULL_VER (branch ${{ matrix.branch }})"

      - name: Refresh debian/changelog version
        if: steps.ref.outputs.skip != 'true'
        run: |
          # Replace the top changelog version with the computed one so
          # dpkg-buildpackage names the .deb correctly.
          DATE_RFC=$(date -uR)
          cat > debian/changelog.new <<EOF
          libcamera-qbcfork (${{ steps.version.outputs.version }}) trixie; urgency=medium

            * Automated build for ${{ github.ref_name }} (branch ${{ matrix.branch }}).

           -- IMX294 QBC fork <will127534@gmail.com>  $DATE_RFC

          EOF
          cat debian/changelog >> debian/changelog.new
          mv debian/changelog.new debian/changelog
          head -10 debian/changelog

      - name: Build .deb
        if: steps.ref.outputs.skip != 'true'
        run: |
          dpkg-buildpackage -b -uc -us
          ls -la ../*.deb

      - name: Collect artifacts
        if: steps.ref.outputs.skip != 'true'
        run: |
          mkdir -p out
          mv ../*.deb out/
          mv ../*.changes out/ 2>/dev/null || true
          mv ../*.buildinfo out/ 2>/dev/null || true
          ls -la out/

      - name: Upload to GitHub Release
        if: steps.ref.outputs.skip != 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/*.deb
            out/*.changes
            out/*.buildinfo

      - name: Upload as workflow artifact (non-tag runs)
        if: steps.ref.outputs.skip != 'true' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: libcamera-qbcfork-${{ matrix.branch }}-${{ steps.version.outputs.version }}
          path: out/
